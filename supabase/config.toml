# AutoTrade AI — Supabase local config
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "autotrade-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[functions.generate-ai-signal]
verify_jwt = true

[functions.run-backtest]
verify_jwt = true

[functions.execute-paper-order]
verify_jwt = true

[functions.update-market-data]
verify_jwt = false

[functions.evaluate-strategy-performance]
verify_jwt = true
